info: |-
  The second BxMO was held 23-25 April 2010. For this edition three guest countries were invited: Slovenia, Spain and Switzerland. In this way the host country the Netherlands could have a try-out for IMO2011. 

  The BxMO was held in Novotel Amsterdam City, the same hotel that the IMO would take place the next year.

  [Website](http://www.wiskundeolympiade.nl/bxmo)
