info: |-
  The sixth edition of the Benelux Mathematical Olympiad (BxMO) took place from 2 to 4 May in Bruges.

  Bruges is one of the most beautiful cities of Belgium. Worldwide Bruges is known as "The Venice of the North" and its specialities are lace and delicious chocolate. Since the year 2000, the historical centre has been added to the World Heritage List of Unesco.

   

  [Website](http://www.BxMO.be)
