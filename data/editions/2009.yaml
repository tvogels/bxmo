info: |-
  The first BxMO was held 8-10 May 2009. The location was the Stayokay youth hostel in Bergen op Zoom. The contestants went swimming after the contest on Saturday, and had a mathematical quiz on Sunday morning before the awards ceremony.

  [Website](http://www.wiskundeolympiade.nl/bxmo/bxmo2009/)
